<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ate Lyn2's Pictures</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Drop Zone for adding photos -->
    <div id="dropZone" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.3s;">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">📷 Memorial Slideshow</h1>
        <p style="font-size: 1.5rem; margin-bottom: 40px;">Drag & drop your photos here</p>
        <p style="font-size: 1rem; opacity: 0.7;">or click anywhere to browse files</p>
        <div id="progress" style="display: none; margin-top: 30px; text-align: center;">
            <p id="progressText" style="font-size: 1.2rem; margin-bottom: 10px;">Processing photos...</p>
            <div style="width: 300px; height: 20px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden;">
                <div id="progressBar" style="width: 0%; height: 100%; background: #fff; transition: width 0.3s;"></div>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
    
    <div class="memorial-container">
        <!-- Content Display Area -->
        <div id="contentDisplay" class="content-display">
            <div id="currentContent" class="content-item"></div>
            <div id="caption" class="caption"></div>
        </div>

        <!-- Control Overlay (shown when paused) -->
        <div id="controlOverlay" class="control-overlay hidden">
            <div class="controls">
                <button id="prevBtn" class="control-btn" aria-label="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <button id="playPauseBtn" class="control-btn large" aria-label="Play/Pause">
                    <svg id="playIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" class="hidden" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                </button>
                <button id="nextBtn" class="control-btn" aria-label="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </button>
            </div>
            <button id="settingsBtn" class="settings-btn" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v6m0 6v6M1 12h6m6 0h6"/>
                </svg>
            </button>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-content">
                <div class="settings-header">
                    <h2>Menu</h2>
                    <button id="closeSettings" class="close-btn" aria-label="Close">&times;</button>
                </div>

                <div class="settings-section">
                    <button id="addMorePhotos" class="primary-btn">➕ Add More Photos</button>
                    <button id="shufflePhotos" class="primary-btn" style="background: #FF9500;">🔀 Shuffle Photos</button>
                    <button id="fullscreenBtn" class="primary-btn" style="background: #34C759;">⛶ Fullscreen</button>
                    <button id="manageContentBtn" class="secondary-btn">📚 Manage Library</button>
                    <button id="clearAll" class="secondary-btn" style="background: rgba(255,0,0,0.3);">🗑️ Clear All</button>
                </div>
            </div>
        </div>

        <!-- Add Content Modal -->
        <div id="addContentModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Photos</h2>
                    <button id="closeAddContent" class="close-btn" aria-label="Close">&times;</button>
                </div>
                
                <div class="input-section">
                    <label class="file-upload">
                        <input type="file" id="photoFile" accept="image/*" multiple>
                        <span>📷 Click to Choose Photos</span>
                    </label>
                    <div id="photoPreview" class="preview-grid hidden"></div>
                </div>

                <div class="modal-actions">
                    <button id="saveContent" class="primary-btn">Add Photos</button>
                    <button id="cancelAddContent" class="secondary-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Content Library Modal -->
        <div id="libraryModal" class="modal hidden">
            <div class="modal-content large">
                <div class="modal-header">
                    <h2>Content Library</h2>
                    <button id="closeLibrary" class="close-btn" aria-label="Close">&times;</button>
                </div>
                
                <div id="libraryList" class="library-list">
                    <!-- Content items will be dynamically added here -->
                </div>

                <div class="modal-actions">
                    <button id="closeLibraryBtn" class="secondary-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
