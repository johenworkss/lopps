<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rew . ind</title>
    <link rel="icon" type="image/x-icon" href="icons/iconers.ico">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- Drop Zone for adding photos -->
    <div id="dropZone" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('icons/sky.gif') center center / cover no-repeat; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;">
        <div style="text-align: center; max-width: 500px; padding: 40px; pointer-events: auto;">
            <div id="clockAnimation" style="width: 200px; height: 200px; margin: 0 auto 24px auto; pointer-events: none;"></div>
            <h1 style="font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); pointer-events: none;">Jhe Memorial</h1>
            <button id="addPhotosBtn" style="font-size: 1.3rem; padding: 16px 32px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 14px; color: #fff; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; letter-spacing: -0.2px;">Drag or drop photos & videos here</button>
        </div>
        <div id="progress" style="display: none; margin-top: 30px; text-align: center; width: 100%; max-width: 400px; padding: 0 20px; pointer-events: auto;">
            <p id="progressText" style="font-size: 1.1rem; margin-bottom: 12px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Processing photos...</p>
            <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                <div id="progressBar" style="width: 0%; height: 100%; background: #fff; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 3px; box-shadow: 0 0 8px rgba(255,255,255,0.5);"></div>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
    
    <div class="memorial-container">
        <!-- Content Display Area -->
        <div id="contentDisplay" class="content-display">
            <div id="currentContent" class="content-item"></div>
            <div id="caption" class="caption"></div>
            
            <!-- Photo Counter Overlay -->
            <div id="photoCounter" class="photo-counter">
                <span id="photoCounterText">1 / 1</span>
            </div>
        </div>

        <!-- Control Overlay (shown when paused) -->
        <div id="controlOverlay" class="control-overlay hidden">
            <div class="controls-top">
                <button id="prevBtn" class="control-btn" aria-label="Previous">
                    <i class="bi bi-chevron-left" style="font-size: 1.25rem;"></i>
                </button>
                <div class="play-settings-group">
                    <button id="playPauseBtn" class="control-btn large" aria-label="Play/Pause">
                        <i id="playIcon" class="bi bi-play-fill" style="font-size: 1.5rem;"></i>
                        <i id="pauseIcon" class="bi bi-pause-fill hidden" style="font-size: 1.5rem;"></i>
                    </button>
                    <button id="settingsBtn" class="settings-btn" aria-label="Settings">
                        <i class="bi bi-grid-3x3-gap" style="font-size: 1.25rem;"></i>
                    </button>
                </div>
                <button id="nextBtn" class="control-btn" aria-label="Next">
                    <i class="bi bi-chevron-right" style="font-size: 1.25rem;"></i>
                </button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-header">
                <h2>Main Menu</h2>
                <button id="closeSettings" class="close-btn" aria-label="Close">
                    <i class="bi bi-x-lg" style="font-size: 1.125rem;"></i>
                </button>
            </div>

            <div class="settings-section">
                <button id="addMorePhotos" class="primary-btn">
                    <i class="bi bi-plus-lg" style="font-size: 1rem;"></i>
                    Add More Photos / Videos
                </button>
                <button id="shufflePhotos" class="primary-btn" style="background: rgba(255, 149, 0, 0.9); box-shadow: 0 4px 12px rgba(255, 149, 0, 0.3);">
                    <i class="bi bi-shuffle" style="font-size: 1rem;"></i>
                    Shuffle Photos
                </button>
                <button id="fullscreenBtn" class="primary-btn" style="background: rgba(52, 199, 89, 0.9); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);">
                    <i class="bi bi-arrows-fullscreen" style="font-size: 1rem;"></i>
                    Fullscreen
                </button>
                
                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Slideshow Speed</label>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
                        <button class="speed-btn" data-speed="1" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">1s</button>
                        <button class="speed-btn active" data-speed="3" style="padding: 10px; background: rgba(0, 122, 255, 0.3); border: 1px solid rgba(0, 122, 255, 0.5); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">3s</button>
                        <button class="speed-btn" data-speed="5" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">5s</button>
                        <button class="speed-btn" data-speed="10" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">10s</button>
                    </div>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Transition Effect</label>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">
                        <button class="transition-btn active" data-transition="fade" style="padding: 10px; background: rgba(0, 122, 255, 0.3); border: 1px solid rgba(0, 122, 255, 0.5); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Fade</button>
                        <button class="transition-btn" data-transition="slide" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Slide</button>
                        <button class="transition-btn" data-transition="zoom" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Zoom</button>
                        <button class="transition-btn" data-transition="dissolve" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Dissolve</button>
                    </div>
                </div>
                
                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Display Mode</label>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">
                        <button class="display-mode-btn active" data-mode="contain" style="padding: 10px; background: rgba(0, 122, 255, 0.3); border: 1px solid rgba(0, 122, 255, 0.5); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Fit Screen</button>
                        <button class="display-mode-btn" data-mode="cover" style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;">Fill Screen</button>
                    </div>
                    <div style="font-size: 11px; opacity: 0.6; margin-top: 6px; line-height: 1.3;">
                        <span id="displayModeDesc">Shows full image with black bars if needed</span>
                    </div>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 10px; transition: all 0.2s;">
                        <input type="checkbox" id="showPhotoCounter" checked style="width: 20px; height: 20px; cursor: pointer;">
                        <span style="flex: 1; font-size: 14px; font-weight: 500;">Show Photo Counter</span>
                    </label>
                </div>
                
                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Background Music</label>
                    <div id="musicSection">
                        <button id="uploadMusicBtn" class="secondary-btn" style="margin-bottom: 8px; background: rgba(255, 204, 0, 0.9); box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);">
                            <i class="bi bi-music-note-beamed" style="font-size: 1rem;"></i>
                            Upload Music
                        </button>
                        <input type="file" id="musicFileInput" accept="audio/*" style="display: none;">
                        
                        <div id="musicControls" style="display: none;">
                            <div style="display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(255, 255, 255, 0.08); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 8px;">
                                <button id="musicPlayPauseBtn" style="width: 32px; height: 32px; border: none; border-radius: 50%; background: rgba(0, 122, 255, 0.3); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;">
                                    <i id="musicPlayIcon" class="bi bi-play-fill" style="font-size: 0.875rem;"></i>
                                    <i id="musicPauseIcon" class="bi bi-pause-fill hidden" style="font-size: 0.875rem;"></i>
                                </button>
                                <div style="flex: 1; overflow: hidden;">
                                    <div id="musicFileName" style="font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Audio.mp3</div>
                                    <div id="musicTime" style="font-size: 11px; opacity: 0.6; margin-top: 2px;">0:00 / 0:00</div>
                                </div>
                                <button id="removeMusicBtn" style="width: 28px; height: 28px; border: none; border-radius: 6px; background: rgba(255, 59, 48, 0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;">
                                    <i class="bi bi-x-lg" style="font-size: 0.875rem;"></i>
                                </button>
                            </div>
                            
                            <div style="padding: 8px 0;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <i class="bi bi-volume-up" style="opacity: 0.6; flex-shrink: 0; font-size: 1rem;"></i>
                                    <input type="range" id="volumeSlider" min="0" max="100" value="70" style="flex: 1; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none;">
                                    <span id="volumeValue" style="font-size: 12px; opacity: 0.7; min-width: 32px; text-align: right;">70%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>
                
                <button id="manageContentBtn" class="secondary-btn" style="background: rgba(138, 43, 226, 0.9); box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3);">
                    <i class="bi bi-collection" style="font-size: 1rem;"></i>
                    Manage Library
                </button>
                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>

                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Video Settings</label>
                    
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 10px; transition: all 0.2s; margin-bottom: 8px;">
                        <input type="checkbox" id="autoPlayVideos" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: #007AFF;">
                        <span style="flex: 1; font-size: 14px; font-weight: 500;">Auto-play videos</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 10px; transition: all 0.2s;">
                        <input type="checkbox" id="loopVideos" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: #007AFF;">
                        <span style="flex: 1; font-size: 14px; font-weight: 500;">Loop videos</span>
                    </label>
                </div>

                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>

                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">Background</label>
                    <div id="bgPreviewContainer" style="width: 100%; height: 100px; border-radius: 10px; overflow: hidden; border: 0.5px solid rgba(255, 255, 255, 0.15); margin-bottom: 10px;">
                        <div id="bgPreview" style="width: 100%; height: 100%; background: url('icons/heaven.gif') center center / cover no-repeat;"></div>
                    </div>
                    <input type="file" id="bgFileInput" accept="image/*,image/gif" style="display: none;">
                    <div style="display: flex; gap: 8px;">
                        <button id="uploadBgBtn" class="primary-btn" style="flex: 1; padding: 10px;">

                            Upload
                        </button>
                        <button id="resetBgBtn" class="secondary-btn" style="padding: 10px;">
                            Reset
                        </button>
                    </div>
                </div>

                <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 16px 0;"></div>

                <button id="clearAll" class="secondary-btn" style="background: rgba(255, 59, 48, 0.15); border-color: rgba(255, 59, 48, 0.3);">
                    <i class="bi bi-trash" style="font-size: 1rem;"></i>
                    Clear All
                </button>
            </div>
        </div>

        <!-- Add Content Modal -->
        <div id="addContentModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                <h2>Add Photos & Videos</h2>
                <button id="closeAddContent" class="close-btn" aria-label="Close">&times;</button>
            </div>
            
            <div class="input-section">
                <label class="file-upload">
                    <input type="file" id="photoFile" accept="image/*,video/*" multiple>
                    <span>📷 Click to Choose Photos & Videos</span>
                </label>
                <div id="photoPreview" class="preview-grid hidden"></div>
            </div>

            <div class="modal-actions">
                <button id="saveContent" class="primary-btn">Add Content</button>
                <button id="cancelAddContent" class="secondary-btn">Cancel</button>
            </div>
            </div>
        </div>

        <!-- Content Library Modal -->
    <div id="libraryModal" class="modal hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Content Library</h2>
                <button id="closeLibrary" class="close-btn" aria-label="Close">
                    <i class="bi bi-x-lg" style="font-size: 1.25rem;"></i>
                </button>
            </div>
            
            <!-- Presets Section -->
            <div style="padding: 12px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.1);">
                <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; opacity: 0.8;">📋 Order Presets</label>
                <div id="presetsContainer" style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <!-- Presets will be dynamically added here -->
                </div>
                <div style="margin-top: 10px; display: flex; gap: 8px;">
                    <input type="text" id="presetNameInput" placeholder="Enter preset name..." style="flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 10px; color: white; font-size: 14px;">
                    <button id="savePresetBtn" class="primary-btn" style="padding: 10px 16px; width: auto;">
                        <i class="bi bi-save" style="font-size: 1rem; margin-right: 4px;"></i>
                        Save
                    </button>
                </div>
            </div>
            
            <div id="libraryList" class="library-list">
                <!-- Content items will be dynamically added here -->
            </div>

            <div class="modal-actions">
                <button id="closeLibraryBtn" class="secondary-btn">Close</button>
            </div>
        </div>
    </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
