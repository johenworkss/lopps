<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Loop - Drag & Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            height: 100vh;
            overflow: hidden;
        }
        
        #dropZone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        #dropZone.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #dropZone h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        #dropZone p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        #dropZone.dragover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        #slideshow {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }
        
        #slideshow img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        #slideshow img.active {
            opacity: 1;
        }
        
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #controls.visible {
            opacity: 1;
        }
        
        button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #info.visible {
            opacity: 1;
        }
        
        #addMoreBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #007AFF;
            padding: 12px 25px;
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #addMoreBtn.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="dropZone">
        <h1>📷 Memorial Slideshow</h1>
        <p>Drag & drop your photos here</p>
        <p style="font-size: 1rem; opacity: 0.7;">or click anywhere to browse files</p>
    </div>
    
    <div id="slideshow"></div>
    
    <div id="info">Photo <span id="current">1</span> of <span id="total">0</span></div>
    
    <div id="controls">
        <button id="prevBtn">◀</button>
        <button id="playBtn">▶ Play</button>
        <button id="pauseBtn" style="display:none;">⏸ Pause</button>
        <button id="nextBtn">▶</button>
    </div>
    
    <button id="addMoreBtn">➕ Add More</button>
    
    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">

    <script>
        let photos = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        const duration = 5000;

        const dropZone = document.getElementById('dropZone');
        const slideshow = document.getElementById('slideshow');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const info = document.getElementById('info');
        const addMoreBtn = document.getElementById('addMoreBtn');

        // Load saved photos
        const saved = localStorage.getItem('memorialPhotos');
        if (saved) {
            photos = JSON.parse(saved);
            if (photos.length > 0) {
                startSlideshow();
            }
        }

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            handleFiles(files);
        });

        // Click to browse
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        addMoreBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
            e.target.value = '';
        });

        function handleFiles(files) {
            if (files.length === 0) return;
            
            let loaded = 0;
            const startIndex = photos.length;
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    photos.push(event.target.result);
                    loaded++;
                    
                    if (loaded === files.length) {
                        localStorage.setItem('memorialPhotos', JSON.stringify(photos));
                        
                        if (startIndex === 0) {
                            startSlideshow();
                        }
                        
                        updateInfo();
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function startSlideshow() {
            dropZone.classList.add('hidden');
            controls.classList.add('visible');
            info.classList.add('visible');
            addMoreBtn.classList.add('visible');
            showPhoto(0);
            play();
        }

        function showPhoto(index) {
            slideshow.innerHTML = `<img src="${photos[index]}" class="active">`;
            currentIndex = index;
            updateInfo();
        }

        function updateInfo() {
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = photos.length;
        }

        function play() {
            if (photos.length === 0) return;
            
            isPlaying = true;
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            
            interval = setInterval(() => {
                currentIndex = (currentIndex + 1) % photos.length;
                showPhoto(currentIndex);
            }, duration);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('playBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
            
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
        }

        // Controls
        document.getElementById('playBtn').addEventListener('click', play);
        document.getElementById('pauseBtn').addEventListener('click', pause);

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (photos.length === 0) return;
            pause();
            currentIndex = (currentIndex + 1) % photos.length;
            showPhoto(currentIndex);
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (photos.length === 0) return;
            pause();
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            showPhoto(currentIndex);
        });

        // Click slideshow to toggle play/pause
        slideshow.addEventListener('click', () => {
            if (photos.length === 0) return;
            if (isPlaying) pause();
            else play();
        });
    </script>
</body>
</html>
