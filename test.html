<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Loop - Simple Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #slideshow {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #slideshow img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        #slideshow img.active {
            opacity: 1;
        }
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            display: none;
        }
        #controls.visible {
            display: block;
        }
        button {
            background: rgba(255,255,255,0.3);
            border: none;
            color: #fff;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: rgba(255,255,255,0.5);
        }
        #addBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #007AFF;
            padding: 15px 30px;
            font-size: 18px;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <button id="addBtn">➕ Add Photos</button>
    <input type="file" id="fileInput" accept="image/*" multiple>
    
    <div id="slideshow"></div>
    
    <div id="controls">
        <button id="prevBtn">◀ Previous</button>
        <button id="playBtn">▶ Play</button>
        <button id="pauseBtn">⏸ Pause</button>
        <button id="nextBtn">Next ▶</button>
    </div>

    <script>
        let photos = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        const duration = 5000; // 5 seconds per photo

        // Load saved photos
        const saved = localStorage.getItem('photos');
        if (saved) {
            photos = JSON.parse(saved);
            if (photos.length > 0) {
                showPhoto(0);
                document.getElementById('controls').classList.add('visible');
            }
        }

        // Add button
        document.getElementById('addBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        // File input
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) return;
            
            let loaded = 0;
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    photos.push(event.target.result);
                    loaded++;
                    
                    if (loaded === files.length) {
                        localStorage.setItem('photos', JSON.stringify(photos));
                        alert(`Added ${files.length} photo(s)!`);
                        
                        if (photos.length === files.length) {
                            showPhoto(0);
                            document.getElementById('controls').classList.add('visible');
                        }
                    }
                };
                reader.readAsDataURL(file);
            });
            
            e.target.value = '';
        });

        // Show photo
        function showPhoto(index) {
            const slideshow = document.getElementById('slideshow');
            slideshow.innerHTML = `<img src="${photos[index]}" class="active">`;
            currentIndex = index;
        }

        // Controls
        document.getElementById('playBtn').addEventListener('click', () => {
            if (photos.length === 0) return;
            
            isPlaying = true;
            interval = setInterval(() => {
                currentIndex = (currentIndex + 1) % photos.length;
                showPhoto(currentIndex);
            }, duration);
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPlaying = false;
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (photos.length === 0) return;
            currentIndex = (currentIndex + 1) % photos.length;
            showPhoto(currentIndex);
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (photos.length === 0) return;
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            showPhoto(currentIndex);
        });

        // Click to pause/play
        document.getElementById('slideshow').addEventListener('click', () => {
            if (isPlaying) {
                document.getElementById('pauseBtn').click();
            } else {
                document.getElementById('playBtn').click();
            }
        });
    </script>
</body>
</html>
